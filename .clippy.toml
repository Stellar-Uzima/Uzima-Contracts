# Uzima Contracts Clippy Configuration
# Enforces coding standards and naming conventions

# Naming conventions
[clippy::naming]
# Functions must be snake_case
function-suffix = ["fn"]
# Types must be PascalCase
type-suffix = ["Type", "Trait", "Struct", "Enum", "Union"]
# Constants must be SCREAMING_SNAKE_CASE
constant-suffix = ["CONST"]
# Modules must be snake_case
module-suffix = ["mod"]
# Allow common abbreviations
allowed-acronyms = ["AI", "AML", "API", "ABE", "DID", "EMR", "FHIR", "IHE", "MPC", "QKD", "RBAC", "ZK", "ZKP"]

# Style enforcement
[clippy::style]
# Prefer snake_case for everything except types
non-snake-case = "deny"
non-upper-case-globals = "deny"

# Error handling
[clippy::correctness]
# Prefer Error over Err for error enums
enum-variant-names = "deny"

# Documentation
[clippy::doc]
# Require documentation for public items
missing-docs = "warn"

# Complexity
[clippy::complexity]
# Warn on overly complex functions
cognitive-complexity-threshold = 25
too-many-arguments = { threshold = 7 }

# Performance
[clippy::perf]
# Suggest performance improvements
trivial-casts = "warn"
trivial-numeric-casts = "warn"

# Pedantic (optional, can be enabled for strict reviews)
#[clippy::pedantic]
# Must-use-attribute = "warn"
# Needless-pass-by-value = "warn"

# Allow common patterns in test code
[clippy::allow-test-code]
allow = [
    "clippy::unwrap_used",
    "clippy::expect_used",
    "clippy::panic",
    "clippy::too_many_arguments",
]

# Disable some overly restrictive lints
[clippy::disallowed]
# Allow module inception for organization
module-inception = "allow"
# Allow similar names for related concepts
similar-names = "allow"
# Allow type complexity for domain models
type-complexity = "allow"

# Custom configuration
[clippy]
# Treat warnings as errors in CI
deny-warnings = false  # Set to true in CI
# Maximum allowed warnings before failing
max-warnings = 100