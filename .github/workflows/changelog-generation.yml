name: Automated Changelog Generation

on:
  release:
    types: [published, edited, prereleased]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to generate changelog for (e.g., v1.2.3)'
        required: true
        type: string
      from_tag:
        description: 'Start tag (leave empty for all commits)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version and tags
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            TAG="$VERSION"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi

          # Strip v prefix for semantic version comparison
          CLEAN_VERSION="${VERSION#v}"

          # Find the previous tag for diff range
          PREV_TAG=""
          if command -v gh &> /dev/null && [[ -n "$GITHUB_TOKEN" ]]; then
            PREV_TAG=$(gh api "/repos/${{ github.repository }}/tags" --jq '.[].name' | \
              grep -v "^$VERSION$" | \
              head -1 || true)
          fi
          if [[ -z "$PREV_TAG" ]]; then
            # Fallback: use git to find last tag
            PREV_TAG=$(git tag --sort=-creatordate | grep -v "^$VERSION$" | head -1 || echo "")
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "clean_version=$CLEAN_VERSION" >> $GITHUB_OUTPUT
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREV_TAG="${{ steps.version.outputs.prev_tag }}"

          echo "Generating changelog for $VERSION (since $PREV_TAG)"

          # Initialize section variables
          ADDED=""
          FIXED=""
          CHANGED=""
          SECURITY=""
          BREAKING=""

          # Determine commit range
          if [[ -n "$PREV_TAG" ]]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          # Process commits
          while IFS= read -r line; do
            HASH=$(echo "$line" | cut -d'|' -f1)
            MSG=$(echo "$line" | cut -d'|' -f2-)

            # Skip merge commits
            if echo "$MSG" | grep -q "^Merge "; then
              continue
            fi

            # Check for breaking changes
            if echo "$MSG" | grep -qi "BREAKING CHANGE"; then
              BREAKING="${BREAKING}- $MSG
        "
            fi

            # Check for security keywords
            if echo "$MSG" | grep -qiE "security|cve|vulnerability|fix.*security"; then
              SECURITY="${SECURITY}- $MSG
        "
            fi

            # Categorize by conventional commit type
            if echo "$MSG" | grep -qE "^feat(\(.+\))?:"; then
              ADDED="${ADDED}- $MSG
        "
            elif echo "$MSG" | grep -qE "^fix(\(.+\))?:"; then
              FIXED="${FIXED}- $MSG
        "
            elif echo "$MSG" | grep -qE "^(docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?:"; then
              CHANGED="${CHANGED}- $MSG
        "
            fi
          done < <(git log --pretty=format:"%H|%s" "$RANGE")

          # Build changelog entry
          RELEASE_DATE=$(date +%Y-%m-%d)
          CHANGELOG_ENTRY="## [$VERSION] - $RELEASE_DATE

        "

          if [[ -n "$BREAKING" ]]; then
            CHANGELOG_ENTRY="${CHANGELOG_ENTRY}### Breaking Changes
        $BREAKING
        "
          fi

          if [[ -n "$ADDED" ]]; then
            CHANGELOG_ENTRY="${CHANGELOG_ENTRY}### Added
        $ADDED
        "
          fi

          if [[ -n "$FIXED" ]]; then
            CHANGELOG_ENTRY="${CHANGELOG_ENTRY}### Fixed
        $FIXED
        "
          fi

          if [[ -n "$CHANGED" ]]; then
            CHANGELOG_ENTRY="${CHANGELOG_ENTRY}### Changed
        $CHANGED
        "
          fi

          if [[ -n "$SECURITY" ]]; then
            CHANGELOG_ENTRY="${CHANGELOG_ENTRY}### Security
        $SECURITY
        "
          fi

          # Store in file for later steps
          echo "$CHANGELOG_ENTRY" > /tmp/changelog_entry.md
          echo "entry<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_ENTRY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANGELOG_FILE="CHANGELOG.md"
          ENTRY_FILE="/tmp/changelog_entry.md"
          ENTRY_CONTENT=$(cat "$ENTRY_FILE")

          if [[ ! -f "$CHANGELOG_FILE" ]]; then
            # Create new changelog
            cat > "$CHANGELOG_FILE" << 'CHANGELOG_HEADER'
        # Changelog

        All notable changes to this project will be documented in this file.

        The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
        and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

        CHANGELOG_HEADER
            echo "" >> "$CHANGELOG_FILE"
            echo "## [Unreleased]" >> "$CHANGELOG_FILE"
            echo "" >> "$CHANGELOG_FILE"
            echo "$ENTRY_CONTENT" >> "$CHANGELOG_FILE"
          else
            # Insert after the Unreleased section header
            awk -v entry="$ENTRY_CONTENT" '
              /^## \[Unreleased\]/ {
                print
                print ""
                print entry
                next
              }
              { print }
            ' "$CHANGELOG_FILE" > /tmp/changelog_updated.md
            mv /tmp/changelog_updated.md "$CHANGELOG_FILE"
          fi

          echo "Updated $CHANGELOG_FILE"
          cat "$CHANGELOG_FILE" | head -50

      - name: Commit and push changelog update
        id: commit
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "docs: update changelog for $VERSION

        Automated changelog update for release $VERSION

        [skip ci]"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Update GitHub Release body
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ENTRY_CONTENT=$(cat /tmp/changelog_entry.md)
          gh release view "${{ github.event.release.tag_name }}" --json body -q .body > /tmp/current_body.txt 2>/dev/null || echo "" > /tmp/current_body.txt

          # Prepend changelog entry to existing release body
          {
            echo "$ENTRY_CONTENT"
            echo "---"
            echo ""
            cat /tmp/current_body.txt
          } > /tmp/new_body.txt

          gh release edit "${{ github.event.release.tag_name }}" \
            --notes-file /tmp/new_body.txt \
            --verify-tag

      - name: Summary
        run: |
          echo "## Changelog Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Previous tag:** ${{ steps.version.outputs.prev_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated Changelog" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/changelog_entry.md >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
