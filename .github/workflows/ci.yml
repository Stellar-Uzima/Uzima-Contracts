# CI for Uzima-Contracts
# Runs tests, wasm32 build verification, and code quality checks

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================================================
  # Tests
  # ============================================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: bash ./scripts/check_error_codes.sh
      - run: bash ./scripts/check_no_production_unwraps.sh
      - run: cargo test --all

  # ============================================================================
  # Wasm32 Build (no_std compliance)
  # ============================================================================
  build:
    name: Build (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Build all contracts for wasm32
        run: |
          for contract in contracts/*/; do
            if [ -d "$contract" ] && [ -f "${contract}Cargo.toml" ]; then
              cd "$contract"
              cargo build --target wasm32-unknown-unknown --release 2>&1 || echo "FAILED: $(basename $contract)"
              cd - > /dev/null
            fi
          done
      - name: Verify #![no_std] attribute
        run: |
          FAILED=0
          for contract in contracts/*/; do
            lib_file="${contract}src/lib.rs"
            if [ -f "$lib_file" ]; then
              [[ "$contract" == *contract_behavior_fuzzing* ]] && continue
              if ! grep -qF '#![no_std]' "$lib_file"; then
                echo "MISSING #![no_std]: $lib_file"
                FAILED=$((FAILED + 1))
              fi
            fi
          done
          [ $FAILED -eq 0 ] || exit 1

  # ============================================================================
  # Code Quality (fmt + clippy)
  # ============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
