name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  RUST_VERSION: "1.92.0"
  CARGO_TERM_COLOR: always

jobs:
  # Contract Event Schema Validation
  event-schemas:
    name: Event Schema Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate event schemas
        run: npm run events:validate

  # Testing Pyramid Metrics + Enforcement
  testing-pyramid:
    name: Testing Pyramid Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate + validate testing pyramid report
        run: npm run test:pyramid:report

      - name: Publish report to job summary
        if: always()
        run: |
          if [ -f reports/testing/pyramid.md ]; then
            cat reports/testing/pyramid.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload pyramid report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testing-pyramid-report
          path: |
            reports/testing/pyramid.json
            reports/testing/pyramid.md
          retention-days: 14

  # Code Quality
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy (static analysis)
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Tests
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev libhidapi-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run all tests
        run: cargo test --all

  # Coverage Enforcement (#465)
  coverage:
    name: Test Coverage Enforcement
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev libhidapi-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-tarpaulin
        run: cargo install --locked cargo-tarpaulin

      - name: Run coverage with threshold enforcement
        run: |
          cargo tarpaulin \
            --out Xml Html \
            --output-dir coverage/ \
            --timeout 600 \
            --exclude-files "tests/*" \
            --ignore-panics \
            --ignore-timeouts \
            --fail-under 70

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Publish coverage summary
        if: always()
        run: |
          echo "## Coverage Report" >> "$GITHUB_STEP_SUMMARY"
          if [ -f coverage/tarpaulin-report.xml ]; then
            echo "Coverage report generated. See artifact for full HTML report." >> "$GITHUB_STEP_SUMMARY"
          fi

  # Node.js Integration Tests
  test-nodejs:
    name: Cloud Health API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/cloud_health_api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: integrations/cloud_health_api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

  # Build WASM contracts
  build:
    name: Build Contracts
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build optimized contracts
        run: |
          set -euo pipefail

          # Build all workspace contracts from root (respects workspace dependencies)
          echo "Building all workspace contracts..."
          if cargo build --target wasm32-unknown-unknown --release --workspace; then
            echo "✅ All workspace contracts built successfully"
          else
            echo "❌ Workspace build failed"
            exit 1
          fi

          # Copy WASM files from root target directory
          mkdir -p dist
          if ls target/wasm32-unknown-unknown/release/*.wasm 1> /dev/null 2>&1; then
            cp target/wasm32-unknown-unknown/release/*.wasm dist/
            echo "Copied $(ls dist/*.wasm | wc -l | tr -d ' ') WASM files to dist/"
            ls -lh dist/
          else
            echo "⚠️ No WASM files found in target directory"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-contracts
          path: dist/*.wasm
          retention-days: 7

  # Contract interoperability tests
  test-interoperability:
    name: Contract Interoperability Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev libhidapi-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run interoperability suite
        run: cargo test -p interoperability_suite --test contract_interoperability -- --nocapture

  # Security Scan (lightweight - only on PRs and main branch)
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install security tools
        run: |
          cargo install --locked --force cargo-audit
          cargo install --locked --force cargo-geiger

      - name: Run dependency + unsafe + custom scans
        id: security_scan
        run: bash ./scripts/security-scan.sh security-reports

      - name: Install Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.4_linux_x64.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Secret detection in commits
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Scanning only PR commit range for secrets..."
            gitleaks detect \
              --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.sha }}" \
              --redact
          else
            echo "Scanning repository for secrets..."
            gitleaks detect --source . --redact
          fi

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: security-reports/
          retention-days: 14

      - name: Publish security summary
        if: always()
        run: |
          if [ -f security-reports/security-summary.md ]; then
            cat security-reports/security-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

  # Quality Metrics Dashboard (#469)
  quality-metrics:
    name: Quality Metrics Dashboard
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, test, test-nodejs, build, security]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate quality metrics dashboard
        run: |
          mkdir -p reports/quality
          cat > reports/quality/dashboard.md << 'DASHBOARD'
          # Quality Metrics Dashboard

          | Metric | Job | Status |
          |--------|-----|--------|
          | Lint & Format | lint | ${{ needs.lint.result }} |
          | Unit/Integration Tests | test | ${{ needs.test.result }} |
          | Node.js API Tests | test-nodejs | ${{ needs.test-nodejs.result }} |
          | WASM Build | build | ${{ needs.build.result }} |
          | Security Scan | security | ${{ needs.security.result }} |
          DASHBOARD

          echo "## 📊 Quality Metrics Dashboard" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lint & Format | ${{ needs.lint.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tests | ${{ needs.test.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Node.js Tests | ${{ needs.test-nodejs.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Security | ${{ needs.security.result }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload quality dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-metrics-dashboard
          path: reports/quality/
          retention-days: 30

  # Summary
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, test-nodejs, build, security]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Lint & Format: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Node.js Tests: ${{ needs.test-nodejs.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.test-nodejs.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" = "failure" ]; then
            echo "❌ CI checks failed"
            exit 1
          fi
          echo "✅ All CI checks passed!" >> $GITHUB_STEP_SUMMARY
