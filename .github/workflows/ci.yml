name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  RUST_VERSION: "1.92.0"
  CARGO_TERM_COLOR: always

jobs:
  # Code Quality
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Tests
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev libhidapi-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run all tests
        run: cargo test --all

  # Node.js Integration Tests
  test-nodejs:
    name: Cloud Health API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/cloud_health_api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: integrations/cloud_health_api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

  # Build WASM contracts
  build:
    name: Build Contracts
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build optimized contracts
        run: |
          set -euo pipefail
          
          # Build workspace contracts with error handling
          echo "Building all workspace contracts..."
          cargo build --target wasm32-unknown-unknown --release --workspace || {
            echo "Some contracts failed to build, checking individual contracts..."
            # Try building individual contracts if workspace build fails
            mkdir -p dist
            built_count=0
            for contract_dir in contracts/*/; do
              if [ -d "$contract_dir" ] && [ -f "$contract_dir/Cargo.toml" ]; then
                contract_name=$(basename "$contract_dir")
                echo "Building $contract_name..."
                if (cd "$contract_dir" && cargo build --target wasm32-unknown-unknown --release); then
                  wasm_file="$contract_dir/target/wasm32-unknown-unknown/release/$contract_name.wasm"
                  if [ -f "$wasm_file" ]; then
                    cp "$wasm_file" "dist/$contract_name.wasm"
                    echo "Built: $contract_name.wasm"
                    built_count=$((built_count + 1))
                  fi
                else
                  echo "Failed to build $contract_name"
                fi
              fi
            done
            echo "Successfully built $built_count contracts"
          }
          
          # Copy WASM files from root target directory (if workspace build succeeded)
          if [ ! -d "dist" ]; then
            mkdir -p dist
          fi
          if ls target/wasm32-unknown-unknown/release/*.wasm 1> /dev/null 2>&1; then
            cp target/wasm32-unknown-unknown/release/*.wasm dist/
            echo "Copied $(ls dist/*.wasm | wc -l | tr -d ' ') WASM files to dist/"
          else
            echo "No WASM files in root target, checking dist directory..."
            if ls dist/*.wasm 1> /dev/null 2>&1; then
              echo "Found $(ls dist/*.wasm | wc -l | tr -d ' ') WASM files in dist/"
            else
              echo "No WASM files found - this might be expected if no contracts are included in workspace"
            fi
          fi
          ls -la dist/ 2>/dev/null || echo "dist directory is empty"

      - name: Install monitoring dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq bc

      - name: Monitor WASM sizes
        run: |
          echo "=== WASM Size Monitoring ==="
          chmod +x scripts/wasm_size_monitor.sh
          if [ -d "dist" ] && ls dist/*.wasm 1> /dev/null 2>&1; then
            ./scripts/wasm_size_monitor.sh
          else
            echo "No WASM files found - skipping size monitoring"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: wasm-contracts
          path: dist/*.wasm
          retention-days: 7

      - name: Upload size trends
        if: success() && hashFiles('**/.wasm_size_trends.json') != ''
        uses: actions/upload-artifact@v3
        with:
          name: wasm-size-trends
          path: .wasm_size_trends.json
          retention-days: 30

  # Security Scan (lightweight - only on PRs and main branch)
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo audit
        run: |
          cargo install cargo-audit --features=fix || true
          cargo audit || echo "⚠️ Audit completed with warnings"

      - name: Install Gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.4_linux_x64.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run secret scan
        run: gitleaks detect --source . --verbose --redact || echo "⚠️ Secret scan completed with warnings"

  # Summary
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test, test-nodejs, build]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Lint & Format: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Node.js Tests: ${{ needs.test-nodejs.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.test-nodejs.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ CI checks failed"
            exit 1
          fi
          echo "✅ All CI checks passed!" >> $GITHUB_STEP_SUMMARY
