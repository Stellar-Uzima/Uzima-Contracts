# CI/CD Workflow for Uzima-Contracts
# Verifies no_std compliance, runs tests, linting, and security checks

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================================================
  # no_std Compliance Verification
  # ============================================================================
  no-std-compliance:
    name: no_std Compliance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Build all contracts for wasm32 (no_std verification)
        run: |
          echo "Building all contracts targeting wasm32-unknown-unknown..."
          for contract in contracts/*/; do
            if [ -d "$contract" ] && [ -f "${contract}Cargo.toml" ]; then
              contract_name=$(basename "$contract")
              echo "Building: $contract_name"
              cd "$contract"
              cargo build --target wasm32-unknown-unknown --release 2>&1 || echo "FAILED: $contract_name"
              cd - > /dev/null
            fi
          done

      - name: Check no_std attribute in all contracts
        run: |
          echo "Verifying #![no_std] attribute in all contracts..."
          FAILED=0
          for contract in contracts/*/; do
            lib_file="${contract}src/lib.rs"
            if [ -f "$lib_file" ]; then
              if ! grep -q "#![no_std]" "$lib_file"; then
                echo "MISSING #![no_std]: $lib_file"
                FAILED=$((FAILED + 1))
              fi
            fi
          done
          if [ $FAILED -gt 0 ]; then
            echo "FAILED: $FAILED contracts missing #![no_std]"
            exit 1
          fi
          echo "All contracts have #![no_std] attribute"

  # ============================================================================
  # Code Formatting & Linting
  # ============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  # ============================================================================
  # Testing
  # ============================================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Run all tests
        run: cargo test --all

  # ============================================================================
  # Module Documentation Check
  # ============================================================================
  docs-check:
    name: Module Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Check module-level documentation
        run: |
          echo "Checking that all contracts have module-level doc comments..."
          FAILED=0
          for contract in contracts/*/; do
            lib_file="${contract}src/lib.rs"
            if [ -f "$lib_file" ]; then
              # Check for module-level doc comments (//! at the beginning of the file)
              if ! head -20 "$lib_file" | grep -q "^//!"; then
                echo "MISSING module docs: $lib_file"
                FAILED=$((FAILED + 1))
              fi
            fi
          done
          if [ $FAILED -gt 0 ]; then
            echo "FAILED: $FAILED contracts missing module-level doc comments"
            exit 1
          fi
          echo "All contracts have module-level documentation"

  # ============================================================================
  # Security Audit
  # ============================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit || true

      - name: Run security audit
        run: cargo audit || echo "Security audit warnings found (non-blocking)"
