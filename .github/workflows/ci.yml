# CI for Uzima-Contracts
# Runs tests, wasm32 build verification, and code quality checks

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================================================
  # Tests
  # ============================================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all

  # ============================================================================
  # Wasm32 Build (no_std compliance)
  # ============================================================================
  build:
    name: Build (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Build all contracts for wasm32
        run: |
          for contract in contracts/*/; do
            if [ -d "$contract" ] && [ -f "${contract}Cargo.toml" ]; then
              cd "$contract"
              cargo build --target wasm32-unknown-unknown --release 2>&1 || echo "FAILED: $(basename $contract)"
              cd - > /dev/null
            fi
          done
      - name: Verify #![no_std] attribute
        run: |
          FAILED=0
          for contract in contracts/*/; do
            lib_file="${contract}src/lib.rs"
            if [ -f "$lib_file" ]; then
              [[ "$contract" == *contract_behavior_fuzzing* ]] && continue
              if ! grep -qF '#![no_std]' "$lib_file"; then
                echo "MISSING #![no_std]: $lib_file"
                FAILED=$((FAILED + 1))
              fi
            fi
          done
          [ $FAILED -eq 0 ] || exit 1

  # ============================================================================
  # Code Quality (fmt + clippy)
  # ============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # Install nightly rustfmt alongside the project's pinned stable
      # toolchain (rust-toolchain.toml pins stable 1.92.0). The repo's
      # `rustfmt.toml` uses options that are only available on nightly
      # rustfmt (e.g. `imports_granularity`, `format_macro_bodies`), so a
      # plain `cargo fmt --check` would either be a no-op or emit
      # "unstable feature" warnings on every run. Running `cargo +nightly fmt`
      # honours the file's intent without forcing the rest of the workspace
      # onto nightly. Devs who want to apply the same formatting locally can
      # run `rustup component add rustfmt --toolchain nightly`.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: cargo fmt (nightly — honours rustfmt.toml's nightly-only options)
        run: cargo +nightly fmt --all -- --check
      - name: cargo clippy (uses project's pinned stable toolchain)
        run: cargo clippy --all-targets -- -D warnings
