name: Contract Review Checklist

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: contract-review-checklist-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review-checklist:
    name: Run contract review automation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Prepare review reports
        run: mkdir -p reports/contract-review

      - name: Capture changed files
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          git diff --name-only "$BASE_SHA" "$HEAD_SHA" | tee reports/contract-review/changed-files.txt

      - name: Test coverage verification
        id: test_coverage
        continue-on-error: true
        run: |
          set -euo pipefail
          {
            echo "## Test Coverage Verification"
            echo
            echo "- cargo test --workspace --all-targets"
            echo "- Changed contract source files must have matching Rust test changes."
            echo
          } > reports/contract-review/test-coverage.md

          cargo test --workspace --all-targets

          changed_contracts="$(grep -E '^contracts/[^/]+/src/.*\.rs$' reports/contract-review/changed-files.txt | cut -d/ -f2 | sort -u || true)"
          missing_tests=0
          for contract in $changed_contracts; do
            if ! grep -Eq "^(contracts/${contract}/src/test\.rs|contracts/${contract}/tests/|tests/).*\\.(rs|ts|js|mjs|sh)$" reports/contract-review/changed-files.txt; then
              echo "- Missing matching test change for contract: ${contract}" >> reports/contract-review/test-coverage.md
              missing_tests=1
            fi
          done

          if [ "$missing_tests" -eq 1 ]; then
            echo "::error::Contract source changed without a matching test file change."
            exit 1
          fi

          echo "- Status: passed" >> reports/contract-review/test-coverage.md

      - name: Style compliance
        id: style
        continue-on-error: true
        run: |
          set -euo pipefail
          {
            echo "## Style Compliance"
            echo
            echo "- cargo fmt --all -- --check"
            echo "- cargo clippy --workspace --all-targets --all-features -- -D warnings"
            echo
          } > reports/contract-review/style.md

          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets --all-features -- -D warnings

          echo "- Status: passed" >> reports/contract-review/style.md

      - name: Documentation presence
        id: documentation
        continue-on-error: true
        run: |
          set -euo pipefail
          docs_changed="$(grep -E '^(docs/|README\.md|CHANGELOG\.md|contracts/[^/]+/README\.md|.*\.md$)' reports/contract-review/changed-files.txt || true)"
          contract_src_changed="$(grep -E '^contracts/[^/]+/src/.*\.rs$' reports/contract-review/changed-files.txt || true)"

          {
            echo "## Documentation Presence"
            echo
            echo "Contract code changes require a docs, README, or changelog update."
            echo
          } > reports/contract-review/docs.md

          if [ -n "$contract_src_changed" ] && [ -z "$docs_changed" ]; then
            echo "::error::Contract source changed without documentation, README, or changelog updates."
            echo "- Status: failed" >> reports/contract-review/docs.md
            echo "- Missing docs update for changed contract source." >> reports/contract-review/docs.md
            exit 1
          fi

          echo "- Status: passed" >> reports/contract-review/docs.md

      - name: Security pattern validation
        id: security
        continue-on-error: true
        run: |
          set -euo pipefail
          {
            echo "## Security Pattern Validation"
            echo
            echo "Scans changed files for hardcoded secrets, insecure URLs, panic-prone production code, and unsafe Rust."
            echo
          } > reports/contract-review/security.md

          findings=0
          while IFS= read -r file; do
            [ -f "$file" ] || continue
            case "$file" in
              *.rs|*.ts|*.tsx|*.js|*.mjs|*.sh|*.toml|*.json|*.yml|*.yaml)
                if grep -nE "(api[_-]?key|secret[_-]?key|private[_-]?key|BEGIN (RSA|EC|OPENSSH) PRIVATE KEY|password[[:space:]]*=[[:space:]]*['\"][^'\"]+['\"]|http://|unsafe[[:space:]]*\{|\.unwrap\(\)|\.expect\()" "$file" >> reports/contract-review/security-findings.txt; then
                  findings=1
                fi
                ;;
            esac
          done < reports/contract-review/changed-files.txt

          if [ "$findings" -eq 1 ]; then
            echo "::error::Security-sensitive patterns found in changed files. Review reports/contract-review/security-findings.txt."
            echo "- Status: failed" >> reports/contract-review/security.md
            sed 's/^/- /' reports/contract-review/security-findings.txt >> reports/contract-review/security.md
            exit 1
          fi

          echo "- Status: passed" >> reports/contract-review/security.md

      - name: Breaking change detection
        id: breaking
        continue-on-error: true
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          breaking=0

          {
            echo "## Breaking Change Detection"
            echo
            echo "Flags removed public functions, removed enum variants, and storage key changes for reviewer attention."
            echo
          } > reports/contract-review/breaking-changes.md

          git diff --unified=0 "$BASE_SHA" "$HEAD_SHA" -- contracts > reports/contract-review/contract.diff || true

          if grep -E '^-.*pub fn [A-Za-z0-9_]+' reports/contract-review/contract.diff > reports/contract-review/removed-public-functions.txt; then
            breaking=1
            echo "### Removed or modified public functions" >> reports/contract-review/breaking-changes.md
            echo '```diff' >> reports/contract-review/breaking-changes.md
            cat reports/contract-review/removed-public-functions.txt >> reports/contract-review/breaking-changes.md
            echo '```' >> reports/contract-review/breaking-changes.md
          fi

          if grep -E '^-.*(enum DataKey|[A-Za-z0-9_]+,)' reports/contract-review/contract.diff | grep -E 'DataKey|Storage|Key|Config|Admin|Owner|Record|State' > reports/contract-review/storage-diff.txt; then
            breaking=1
            echo "### Storage or enum changes" >> reports/contract-review/breaking-changes.md
            echo '```diff' >> reports/contract-review/breaking-changes.md
            cat reports/contract-review/storage-diff.txt >> reports/contract-review/breaking-changes.md
            echo '```' >> reports/contract-review/breaking-changes.md
          fi

          if [ "$breaking" -eq 1 ]; then
            if ! grep -Eq '^(CHANGELOG\.md|docs/.*(migration|upgrade|api|CHANGE|VERSION).*)' reports/contract-review/changed-files.txt; then
              echo "::error::Potential breaking contract changes detected without changelog, API, migration, or upgrade documentation."
              echo "- Status: failed" >> reports/contract-review/breaking-changes.md
              exit 1
            fi
            echo "- Status: warning, reviewer confirmation required" >> reports/contract-review/breaking-changes.md
          else
            echo "- Status: no obvious breaking changes detected" >> reports/contract-review/breaking-changes.md
          fi

      - name: Build checklist summary
        if: always()
        run: |
          {
            echo "<!-- contract-review-checklist-bot -->"
            echo "## Contract Review Checklist"
            echo
            echo "### Automated Checks"
            echo
            echo "- Test coverage verification: ${{ steps.test_coverage.outcome || 'see job result' }}"
            echo "- Style compliance: ${{ steps.style.outcome || 'see job result' }}"
            echo "- Documentation presence: ${{ steps.documentation.outcome || 'see job result' }}"
            echo "- Security pattern validation: ${{ steps.security.outcome || 'see job result' }}"
            echo "- Breaking change detection: ${{ steps.breaking.outcome || 'see job result' }}"
            echo
            echo "### Manual Items"
            echo
            echo "- [ ] Complete or waive docs/SECURITY_CHECKLIST.md for contract changes"
            echo "- [ ] Confirm access control and require_auth coverage"
            echo "- [ ] Review cross-contract callers and dependency impact"
            echo "- [ ] Confirm migration plan for storage/schema changes"
            echo "- [ ] Confirm public API, event, and changelog updates"
            echo "- [ ] Confirm deployment, rollback, and monitoring notes where applicable"
            echo
            cat \
              reports/contract-review/test-coverage.md \
              reports/contract-review/style.md \
              reports/contract-review/docs.md \
              reports/contract-review/security.md \
              reports/contract-review/breaking-changes.md \
              2>/dev/null || true
          } > reports/contract-review/summary.md

          cat reports/contract-review/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment checklist on pull request
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- contract-review-checklist-bot -->';
            const body = fs.readFileSync('reports/contract-review/summary.md', 'utf8').slice(0, 60000);
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const previous = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Upload review reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-review-checklist
          path: reports/contract-review/

      - name: Fail workflow when automated checks fail
        if: always()
        run: |
          failed=0
          for outcome in \
            "${{ steps.test_coverage.outcome }}" \
            "${{ steps.style.outcome }}" \
            "${{ steps.documentation.outcome }}" \
            "${{ steps.security.outcome }}" \
            "${{ steps.breaking.outcome }}"; do
            if [ "$outcome" = "failure" ]; then
              failed=1
            fi
          done

          if [ "$failed" -eq 1 ]; then
            echo "::error::One or more contract review checklist checks failed."
            exit 1
          fi
