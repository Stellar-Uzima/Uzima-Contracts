name: Deploy

on:
  # Auto-deploy to testnet on develop branch
  push:
    branches: [ develop ]
    tags:
      - 'v*'
  # Manual deployment to any network
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to deploy to'
        required: true
        type: choice
        options:
          - testnet
          - mainnet
        default: testnet
      contract:
        description: 'Contract to deploy (leave empty for all)'
        required: false
        type: string
      skip_tests:
        description: 'Skip tests before deployment'
        required: false
        type: boolean
        default: false
      confirm_mainnet:
        description: 'Type "DEPLOY" to confirm mainnet deployment'
        required: false
        type: string

env:
  RUST_VERSION: "1.92.0"
  SOROBAN_VERSION: "21.7.7"

jobs:
  # Determine network and validate
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Determine network
        id: network
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "network=${{ inputs.network }}" >> $GITHUB_OUTPUT
            echo "source=manual" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "network=testnet" >> $GITHUB_OUTPUT
            echo "source=tag" >> $GITHUB_OUTPUT
          else
            echo "network=testnet" >> $GITHUB_OUTPUT
            echo "source=branch" >> $GITHUB_OUTPUT
          fi

      - name: Mainnet safety check
        if: steps.network.outputs.network == 'mainnet'
        run: |
          if [ "${{ inputs.confirm_mainnet }}" != "DEPLOY" ]; then
            echo "❌ Mainnet deployment not confirmed. Type 'DEPLOY' in the confirm field."
            exit 1
          fi
          echo "✅ Mainnet deployment confirmed"

  # Run tests before deployment
  pre-deploy-tests:
    name: Pre-deployment Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [validate]
    if: github.event_name != 'workflow_dispatch' || (github.event_name == 'workflow_dispatch' && inputs.skip_tests != true)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --all

  # Build contracts
  build:
    name: Build Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [validate, pre-deploy-tests]
    if: always() && (needs.pre-deploy-tests.result == 'success' || needs.pre-deploy-tests.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown

      - name: Install Soroban CLI
        run: |
          cargo install --locked --version ${{ env.SOROBAN_VERSION }} soroban-cli

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build optimized contracts
        run: |
          mkdir -p dist
          for contract in contracts/*/; do
            if [ -d "$contract" ]; then
              contract_name=$(basename "$contract")
              echo "Building contract: $contract_name"
              pushd "$contract" > /dev/null
              cargo build --target wasm32-unknown-unknown --release
              popd > /dev/null
              
              wasm_file="$contract/target/wasm32-unknown-unknown/release/${contract_name}.wasm"
              if [ -f "$wasm_file" ]; then
                cp "$wasm_file" "dist/${contract_name}.wasm"
                echo "Copied: ${contract_name}.wasm"
              fi
            fi
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-contracts-${{ needs.validate.outputs.network || 'testnet' }}
          path: dist/*.wasm
          retention-days: 30
          if-no-files-found: warn

  # Deploy to network
  deploy:
    name: Deploy to ${{ needs.validate.outputs.network || 'testnet' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [validate, build]
    environment:
      name: ${{ needs.validate.outputs.network || 'testnet' }}
      url: ${{ needs.validate.outputs.network == 'mainnet' && 'https://soroban-rpc.stellar.org' || 'https://soroban-testnet.stellar.org' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Soroban CLI
        run: |
          cargo install --locked --version ${{ env.SOROBAN_VERSION }} soroban-cli

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: wasm-contracts-${{ needs.validate.outputs.network || 'testnet' }}
          path: dist/

      - name: Validate network configuration
        run: |
          chmod +x scripts/network_manager.sh
          chmod +x scripts/validate_network_config.sh
          ./scripts/validate_network_config.sh --network testnet

      - name: Configure Soroban network
        run: |
          NETWORK="${{ needs.validate.outputs.network || 'testnet' }}"
          chmod +x scripts/network_manager.sh
          ./scripts/network_manager.sh configure "$NETWORK"

      - name: Setup deployment identity
        env:
          MAINNET_KEY: ${{ secrets.MAINNET_DEPLOYER_SECRET_KEY }}
          TESTNET_KEY: ${{ secrets.TESTNET_DEPLOYER_SECRET_KEY }}
        run: |
          NETWORK="${{ needs.validate.outputs.network || 'testnet' }}"
          if [ "$NETWORK" = "mainnet" ]; then
            if [ -z "$MAINNET_KEY" ]; then
              echo "❌ MAINNET_DEPLOYER_SECRET_KEY secret is required"
              exit 1
            fi
            echo "$MAINNET_KEY" > /tmp/secret_key.txt
            soroban config identity add deployer --secret-key /tmp/secret_key.txt
            rm -f /tmp/secret_key.txt
          else
            if [ -n "$TESTNET_KEY" ]; then
              echo "$TESTNET_KEY" > /tmp/secret_key.txt
              soroban config identity add deployer --secret-key /tmp/secret_key.txt || true
              rm -f /tmp/secret_key.txt
            else
              if ! soroban config identity show deployer &> /dev/null; then
                soroban config identity generate deployer
              fi
              soroban config identity fund deployer --network testnet || true
            fi
          fi

      - name: Deploy contracts using enhanced deployment script
        id: deploy
        env:
          MAINNET_KEY: ${{ secrets.MAINNET_DEPLOYER_SECRET_KEY }}
          TESTNET_KEY: ${{ secrets.TESTNET_DEPLOYER_SECRET_KEY }}
        run: |
          NETWORK="${{ needs.validate.outputs.network || 'testnet' }}"
          mkdir -p deployments
          deployment_log="deployments/${NETWORK}_$(date +%Y%m%d_%H%M%S).json"
          
          # Setup deployment identity
          if [ "$NETWORK" = "mainnet" ]; then
            if [ -z "$MAINNET_KEY" ]; then
              echo "❌ MAINNET_DEPLOYER_SECRET_KEY secret is required"
              exit 1
            fi
            echo "$MAINNET_KEY" > /tmp/secret_key.txt
            soroban config identity add deployer --secret-key /tmp/secret_key.txt
            rm -f /tmp/secret_key.txt
            DEPLOYMENT_IDENTITY="deployer"
          else
            if [ -n "$TESTNET_KEY" ]; then
              echo "$TESTNET_KEY" > /tmp/secret_key.txt
              soroban config identity add deployer --secret-key /tmp/secret_key.txt || true
              rm -f /tmp/secret_key.txt
              DEPLOYMENT_IDENTITY="deployer"
            else
              DEPLOYMENT_IDENTITY="ci-deployer"
              if ! soroban config identity show "$DEPLOYMENT_IDENTITY" &> /dev/null; then
                soroban config identity generate "$DEPLOYMENT_IDENTITY"
              fi
              soroban config identity fund "$DEPLOYMENT_IDENTITY" --network testnet || true
            fi
          fi
          
          # Make scripts executable
          chmod +x scripts/deploy_enhanced.sh
          chmod +x scripts/verify_deployment.sh
          
          # Determine which contracts to deploy
          if [ -n "${{ inputs.contract }}" ]; then
            contracts="${{ inputs.contract }}"
          else
            contracts=$(ls -d contracts/*/ | xargs -n1 basename | grep -v -E "(credential_notifications|medical_imaging|medical_records|healthcare_compliance|medical_record_hash_registry|appointment_booking_escrow|patient_consent_management|clinical_nlp|clinical_decision_support|remote_patient_monitoring|healthcare_analytics_dashboard|healthcare_data_marketplace|telemedicine|patient_portal|notification_system|mental_health_support|patient_gamification|medical_imaging_ai|dicomweb_services|emergency_access_override|health_data_access_logging|escrow|mfa|multi_region_orchestrator|regional_node_manager|digital_twin|aml|forensics|audit|federated_learning|rbac|sync_manager|failover_detector|healthcare_compliance_automation|drug_discovery|upgradeability|health_check)")
          fi
          
          # Enable simulation for testnet, dry-run for mainnet safety
          if [ "$NETWORK" = "mainnet" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            DEPLOY_MODE="--dry-run"
          elif [ "$NETWORK" = "testnet" ]; then
            DEPLOY_MODE="--simulation"
          else
            DEPLOY_MODE=""
          fi
          
          echo "[]" > "$deployment_log"
          
          for contract_name in $contracts; do
            echo "Deploying $contract_name to $NETWORK..."
            
            # Deploy using enhanced deployment script
            if ./scripts/deploy_enhanced.sh "$contract_name" "$NETWORK" --identity "$DEPLOYMENT_IDENTITY" $DEPLOY_MODE --skip-build; then
              # Extract contract ID from deployment info
              if [ -f "deployments/${contract_name}_${NETWORK}.json" ]; then
                contract_id=$(jq -r '.contract_id' "deployments/${contract_name}_${NETWORK}.json" 2>/dev/null || echo "")
                if [ -n "$contract_id" ] && [ "$contract_id" != "null" ]; then
                  echo "✅ Deployed $contract_name: $contract_id"
                  
                  # Save deployment info
                  jq --arg name "$contract_name" \
                     --arg id "$contract_id" \
                     --arg network "$NETWORK" \
                     --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
                     --arg commit "${{ github.sha }}" \
                     '. += [{
                       "contract_name": $name,
                       "contract_id": $id,
                       "network": $network,
                       "deployed_at": $timestamp,
                       "commit_sha": $commit,
                       "deployer": "'$DEPLOYMENT_IDENTITY'",
                       "source": "${{ needs.validate.outputs.source || 'branch' }}"
                     }]' "$deployment_log" > "${deployment_log}.tmp" && mv "${deployment_log}.tmp" "$deployment_log"
                else
                  echo "Warning: Could not extract contract ID for $contract_name"
                fi
              else
                echo "Warning: Deployment info file not found for $contract_name"
              fi
            else
              echo "Error: Failed to deploy $contract_name"
              if [ "$NETWORK" != "mainnet" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                exit 1
              fi
            fi
          done
          
          echo "deployment_log=$deployment_log" >> $GITHUB_OUTPUT
          cat "$deployment_log"

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-info-${{ needs.validate.outputs.network || 'testnet' }}
          path: deployments/*.json
          retention-days: ${{ needs.validate.outputs.network == 'mainnet' && '365' || '90' }}
          if-no-files-found: warn

      - name: Create deployment summary
        run: |
          NETWORK="${{ needs.validate.outputs.network || 'testnet' }}"
          if [ "$NETWORK" = "mainnet" ]; then
            echo "## 🚀 Mainnet Deployment Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**⚠️ PRODUCTION DEPLOYMENT**" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Testnet Deployment Summary" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Source:** ${{ needs.validate.outputs.source || 'branch' }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "**Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployed Contracts" >> $GITHUB_STEP_SUMMARY
          cat "${{ steps.deploy.outputs.deployment_log }}" | jq -r '.[] | "- **\(.contract_name)**: `\(.contract_id)`"' >> $GITHUB_STEP_SUMMARY
          if [ "$NETWORK" = "mainnet" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ⚠️ Important" >> $GITHUB_STEP_SUMMARY
            echo "- Verify all contracts are functioning correctly" >> $GITHUB_STEP_SUMMARY
            echo "- Monitor contract health: \`./scripts/monitor_deployments.sh mainnet\`" >> $GITHUB_STEP_SUMMARY
            echo "- Keep deployment logs for audit purposes" >> $GITHUB_STEP_SUMMARY
          fi
