name: Contract Optimization Analysis

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'contracts/**'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze Contracts for Optimizations
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.78.0
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build optimizer
        run: cargo build --release --package contract_optimizer

      - name: Run optimization analysis
        run: cargo run --release --package contract_optimizer -- analyze --format json > optimization_results.json

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('optimization_results.json', 'utf8'));

            let comment = '## 🚀 Contract Optimization Recommendations\n\n';
            comment += 'The Contract Optimization Engine has analyzed the changes and found the following optimization opportunities:\n\n';

            if (results.length === 0) {
              comment += '✅ No optimization opportunities found. Great job!\n';
            } else {
              for (const analysis of results) {
                comment += `### ${analysis.contract_name}\n\n`;
                for (const opt of analysis.optimizations) {
                  const severityEmoji = opt.severity === 'high' ? '🔴' : opt.severity === 'medium' ? '🟡' : '🟢';
                  comment += `${severityEmoji} **${opt.category}** (${opt.severity})\n`;
                  comment += `${opt.description}\n\n`;
                  comment += `💡 **Suggestion:** ${opt.suggestion}\n\n`;
                  if (opt.location) {
                    comment += `📍 **Location:** ${opt.location}\n\n`;
                  }
                  comment += '---\n\n';
                }
              }
            }

            comment += 'For more details, run `cargo run --package contract_optimizer -- analyze` locally.\n\n';
            comment += 'To track accuracy, please reply to this comment if you apply any recommendations.';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Upload analysis results
        uses: actions/upload-artifact@v4
        with:
          name: optimization-analysis
          path: optimization_results.json
          retention-days: 30