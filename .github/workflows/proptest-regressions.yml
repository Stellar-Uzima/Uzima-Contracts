name: Proptest Regressions Check

on:
  pull_request:
    paths:
      - 'contracts/**/tests/proptest-regressions/**'
      - 'contracts/**/src/test.rs'
      - 'contracts/**/Cargo.toml'

jobs:
  check-regressions:
    runs-on: ubuntu-latest
    name: Ensure Proptest Regressions Committed
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Run proptest properties for all healthcare contracts
        run: |
          cd contracts/medical_records && cargo test --lib proptest 2>&1 | tee /tmp/medical_records_test.log || true
          cd ../patient_consent_management && cargo test --lib proptest 2>&1 | tee /tmp/patient_consent_test.log || true
          cd ../healthcare_data_marketplace && cargo test --lib proptest 2>&1 | tee /tmp/marketplace_test.log || true
          cd ../medical_consent_nft && cargo test --lib proptest 2>&1 | tee /tmp/nft_test.log || true
      
      - name: Check for uncommitted regression files
        run: |
          set +e
          UNCOMMITTED=$(git status --porcelain | grep "tests/proptest-regressions/" | grep -v "??")
          if [ -n "$UNCOMMITTED" ]; then
            echo "ERROR: Proptest regression seed files must be committed!"
            echo "Uncommitted changes:"
            echo "$UNCOMMITTED"
            echo ""
            echo "Please commit these regression files to ensure deterministic test execution:"
            git diff tests/proptest-regressions/
            exit 1
          fi
          echo "✓ All proptest regression files are committed"
          exit 0

  test-properties:
    runs-on: ubuntu-latest
    name: Verify Property-Based Tests
    strategy:
      matrix:
        contract: 
          - medical_records
          - patient_consent_management
          - healthcare_data_marketplace
          - medical_consent_nft
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      
      - name: Run proptest properties for ${{ matrix.contract }}
        run: |
          cd contracts/${{ matrix.contract }}
          echo "Testing ${{ matrix.contract }} with proptest (minimum 256 cases per property)..."
          PROPTEST_CASES=256 cargo test --lib proptest --release -- --nocapture
      
      - name: Verify regression directory exists
        run: |
          if [ ! -d "contracts/${{ matrix.contract }}/tests/proptest-regressions" ]; then
            echo "ERROR: Regression directory not found for ${{ matrix.contract }}"
            exit 1
          fi
          echo "✓ Regression directory exists for ${{ matrix.contract }}"
