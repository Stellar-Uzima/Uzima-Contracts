# Secret Scan (issue #915)
#
# CI half of the secret-scanning policy. The pre-commit hook
# (.pre-commit-config.yaml) is the local first line of defence; this workflow
# is the enforced gate: it runs gitleaks over the full repository on every push
# and pull request and FAILS (blocking the merge when marked required) if any
# secret is detected. Both sides share the same `.gitleaks.toml` allowlist, so
# local and CI verdicts match.
#
# A dedicated workflow keeps secret scanning independent of the build/test
# matrix in ci.yml and of the dependency-audit workflow (security-audit.yml),
# so a failure here points unambiguously at a leaked credential.
name: Secret Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the scan covers every commit in the branch/PR, not
          # just the tip. gitleaks is fast (~2s over ~700 commits here).
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan full history for secrets
        # `gitleaks git` walks all reachable commits; `--redact` keeps any match
        # out of the public CI log; the root `.gitleaks.toml` is auto-detected.
        # Exits non-zero on any non-allowlisted finding, failing the job.
        run: gitleaks git . --redact --verbose
