name: WASM Size Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  wasm-size:
    name: Check WASM binary sizes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install binaryen (wasm-opt)
        run: sudo apt-get install -y binaryen

      - name: Build optimized WASM
        run: |
          cargo build --release --target wasm32-unknown-unknown \
            --workspace \
            --exclude contract_optimizer \
            --exclude uzima-tests \
            --exclude interoperability_suite

      - name: Optimize WASM with wasm-opt
        run: |
          for wasm in target/wasm32-unknown-unknown/release/*.wasm; do
            [ -f "$wasm" ] || continue
            wasm-opt -Oz --strip-debug --strip-producers "$wasm" -o "$wasm"
          done

      - name: Check WASM sizes
        id: size_check
        run: |
          # Soroban enforces a hard 64 KB limit on deployed WASM binaries.
          # WARN_KB gives an early signal before reaching that ceiling.
          WARN_KB=50
          ERROR_KB=64
          FAILED=0

          # Load known exceptions: contracts that currently exceed ERROR_KB and
          # are tracked for future optimization.  New contracts are NOT exempt —
          # they still fail the build if they exceed the limit.
          KNOWN_EXCEPTIONS=""
          if [ -f ".github/wasm-size-exceptions.txt" ]; then
            KNOWN_EXCEPTIONS=$(grep -v '^\s*#' .github/wasm-size-exceptions.txt \
              | awk 'NF { print $1 }' | tr '\n' ' ')
          fi

          echo "| Contract | Size (KB) | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|"                      >> $GITHUB_STEP_SUMMARY

          for wasm in target/wasm32-unknown-unknown/release/*.wasm; do
            [ -f "$wasm" ] || continue
            name=$(basename "$wasm" .wasm)
            size_bytes=$(stat -c%s "$wasm")
            size_kb=$(echo "scale=1; $size_bytes / 1024" | bc)

            # Check whether this contract is in the known-exceptions list
            is_exception=0
            for ex in $KNOWN_EXCEPTIONS; do
              if [ "$name" = "$ex" ]; then
                is_exception=1
                break
              fi
            done

            if (( size_bytes > ERROR_KB * 1024 )); then
              if [ "$is_exception" -eq 1 ]; then
                status="⚠️ KNOWN EXCEPTION: exceeds ${ERROR_KB}KB (tracked for optimization)"
              else
                status="❌ EXCEEDS ${ERROR_KB}KB limit"
                FAILED=1
              fi
            elif (( size_bytes > WARN_KB * 1024 )); then
              status="⚠️ Approaching limit"
            else
              status="✅ OK"
            fi

            echo "| $name | $size_kb | $status |" >> $GITHUB_STEP_SUMMARY
            echo "$status  $name: ${size_kb}KB"
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::One or more WASM binaries exceed the ${ERROR_KB}KB Soroban size limit."
            echo "::error::If this is a pre-existing contract, add it to .github/wasm-size-exceptions.txt with a remediation note."
            exit 1
          fi
