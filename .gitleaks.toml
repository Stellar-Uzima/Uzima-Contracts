# gitleaks configuration (issue #915)
#
# Secret-scanning policy for Uzima-Contracts. Extends the upstream default
# gitleaks ruleset and adds a TIGHTLY SCOPED allowlist for known false
# positives. Every allowlist entry is documented; none of them suppress a live
# credential (see docs/SECRET_MANAGEMENT.md for the audit that established this).
#
# Used by both the pre-commit hook (.pre-commit-config.yaml) and CI
# (.github/workflows/secret-scan.yml). Keep the allowlist minimal: prefer
# fixing or removing a flagged value over adding a broad pattern here.

title = "Uzima-Contracts gitleaks config"

[extend]
# Inherit the full upstream ruleset; we only ADD an allowlist below.
useDefault = true

[allowlist]
description = "Documented non-secrets. None are live credentials."

# --- Path-scoped allowlist ---------------------------------------------------
paths = [
    # Committed Rust build artifacts. `**/target/` is in .gitignore, but ~1.2k
    # target files were committed historically. They are binary .rlib/.rmeta and
    # cargo bookkeeping, never source, and only add scanner noise.
    '''.*/target/.*''',
    # Generated zero-knowledge test fixtures: public Groth16 proof points and
    # credential commitment HASHES (not secrets). Regenerated by the ZK tests.
    '''tests/\.tmp-zk/.*''',
    # gitleaks' own config: the regexes below necessarily contain the very
    # strings they allowlist, which would otherwise self-flag.
    '''\.gitleaks\.toml''',
]

# --- Value-scoped allowlist (exact strings, so real secrets still trip) ------
regexes = [
    # W3C DID verification-method TYPE identifiers — public standard constants
    # emitted into the generated SDK bindings and the generator script. Matched
    # by the broad `generic-api-key` rule because they sit next to `_KEY_`.
    '''Ed25519VerificationKey2020''',
    '''X25519KeyAgreementKey2020''',
    # Truncated placeholder in scripts/deploy_forensics.ts: the literal value is
    # 'SAKLGIB3G6P7E5YV...' (note the trailing "..." INSIDE the string, with a
    # `// placeholder` comment) — a 16-char stub, not a valid 56-char Stellar
    # seed. Scoped to the exact stub so any real S... seed still fails the scan.
    '''SAKLGIB3G6P7E5YV\.\.\.''',
]
