# Pre-commit hooks for Uzima-Contracts (issue #915)
#
# Secret scanning that runs locally on every `git commit`. Install once:
#
#     pip install pre-commit      # or: brew install pre-commit
#     pre-commit install          # wires the git hook
#
# The gitleaks hook scans STAGED changes against the repo's `.gitleaks.toml`
# (allowlist documented there) and aborts the commit if a secret is detected.
# CI runs the same tool on every push/PR (.github/workflows/secret-scan.yml),
# so the local hook is a fast first line of defence, not the only one.
#
# Run against the whole tree on demand:  pre-commit run --all-files
minimum_pre_commit_version: "3.0.0"

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      # Runs `gitleaks git --pre-commit --redact --staged` and honours the
      # root `.gitleaks.toml`. Detected secrets are redacted in output so the
      # secret itself is never echoed into terminal scrollback or CI logs.
      - id: gitleaks
