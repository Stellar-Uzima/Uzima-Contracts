repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/crate-ci/typos
    rev: v1.30.1
    hooks:
      - id: typos

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        language: system
        types: [rust]
        entry: cargo fmt --all -- --check
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        language: system
        types: [rust]
        entry: cargo clippy --all-targets -- -D warnings
        pass_filenames: false

      - id: cargo-test
        name: cargo test
        language: system
        types: [rust]
        entry: cargo test --all
        pass_filenames: false

      - id: shellcheck
        name: shellcheck
        language: system
        types: [shell]
        entry: shellcheck
        args: ["-s", "bash", "-x"]

  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.63.0
    hooks:
      - id: trufflehog
        args: [--fail]